<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PONG GAME</h1>
            <p>Control left paddle with Mouse or Arrow Keys (Up/Down)</p>
        </div>
        
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span class="score-value" id="playerScore">0</span>
            </div>
            <div class="divider">vs</div>
            <div class="score">
                <span class="label">Computer</span>
                <span class="score-value" id="computerScore">0</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="controls">
            <p><strong>Controls:</strong></p>
            <ul>
                <li>🖱️ Mouse Y-position to move left paddle</li>
                <li>⬆️⬇️ Arrow Keys Up/Down to move left paddle</li>
                <li>R - Reset Game</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
